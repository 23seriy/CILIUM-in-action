# Default deny all ingress traffic in cilium-demo namespace.
# This is the foundation of a zero-trust network — deny everything,
# then explicitly allow only what's needed.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: cilium-demo
spec:
  endpointSelector: {}
  ingress:
    - {}
---
# After applying this, replace it with a true deny-all:
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-all
  namespace: cilium-demo
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
