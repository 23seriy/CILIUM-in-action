apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoreboard-api
  namespace: cilium-demo
  labels:
    app: scoreboard-api
    role: public
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scoreboard-api
  template:
    metadata:
      labels:
        app: scoreboard-api
        role: public
    spec:
      containers:
        - name: scoreboard-api
          image: scoreboard-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: STATS_SERVICE_URL
              value: "http://stats-service:8080"
            - name: NEWS_SERVICE_URL
              value: "http://news-service:8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scoreboard-api
  namespace: cilium-demo
  labels:
    app: scoreboard-api
spec:
  selector:
    app: scoreboard-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
